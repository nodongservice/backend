include /etc/nginx/conf.d/bridgework-upstream.inc;

upstream bridgework_fastapi_backend {
    # FastAPI 별도 배포 파이프라인에서 19000/19001 슬롯을 사용한다.
    # 기본은 19000, 19001은 백업 슬롯으로 둔다.
    server 127.0.0.1:19000 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:19001 backup max_fails=3 fail_timeout=10s;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.bridgework.cloud;

    # HTTP 요청은 HTTPS로 강제 전환한다.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.bridgework.cloud;

    ssl_certificate /etc/letsencrypt/live/api.bridgework.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bridgework.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 인증서 발급 후 브라우저가 HTTPS를 우선 사용하도록 강제한다.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20m;

    # Spring API는 /api/java/v1/* 경로를 /api/v1/*로 매핑한다.
    location = /api/java/v1 {
        return 308 /api/java/v1/;
    }

    location /api/java/v1/ {
        proxy_pass http://bridgework_backend/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # FastAPI는 /api/py/v1/* 경로를 /api/v1/*로 매핑한다.
    location = /api/py/v1 {
        return 308 /api/py/v1/;
    }

    location /api/py/v1/ {
        proxy_pass http://bridgework_fastapi_backend/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location / {
        return 404;
    }
}
