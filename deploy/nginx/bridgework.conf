include /etc/nginx/conf.d/bridgework-upstream.inc;
include /etc/nginx/conf.d/fastapi-upstream.inc;

server {
    listen 80;
    listen [::]:80;
    server_name api.bridgework.cloud;

    # HTTP 요청은 HTTPS로 강제 전환한다.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.bridgework.cloud;

    ssl_certificate /etc/letsencrypt/live/api.bridgework.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bridgework.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 인증서 발급 후 브라우저가 HTTPS를 우선 사용하도록 강제한다.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20m;

    # Spring Swagger UI 엔트리 포인트를 java 네임스페이스로 고정한다.
    location = /api/java/swagger-ui.html {
        return 308 /api/java/swagger-ui/index.html?configUrl=/api/java/v3/api-docs/swagger-config;
    }

    # index.html 직접 접근 시 configUrl가 없을 때만 엔트리 포인트로 유도한다.
    location = /api/java/swagger-ui/index.html {
        if ($arg_configUrl = "") {
            return 308 /api/java/swagger-ui.html;
        }
        proxy_pass http://bridgework_backend/swagger-ui/index.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api/java;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # 디렉터리 경로 접근은 고정 엔트리 포인트로 유도한다.
    location = /api/java/swagger-ui/ {
        return 308 /api/java/swagger-ui.html;
    }

    # Spring Swagger 정적 리소스를 java 네임스페이스로 전달한다.
    location /api/java/swagger-ui/ {
        proxy_pass http://bridgework_backend/swagger-ui/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api/java;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # Spring OpenAPI 문서를 java 네임스페이스로 전달한다.
    location = /api/java/v3/api-docs {
        proxy_pass http://bridgework_backend/v3/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api/java;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # 일부 swagger-ui 환경은 prefix 없이 기본 경로(/v3/api-docs/*)를 조회하므로 호환 라우트를 둔다.
    location = /v3/api-docs {
        proxy_pass http://bridgework_backend/v3/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api/java;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location /v3/api-docs/ {
        proxy_pass http://bridgework_backend/v3/api-docs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api/java;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location /api/java/v3/api-docs/ {
        proxy_pass http://bridgework_backend/v3/api-docs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api/java;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location = /api/java/v3/api-docs.yaml {
        proxy_pass http://bridgework_backend/v3/api-docs.yaml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api/java;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # FastAPI Swagger 엔트리 포인트를 py 네임스페이스로 고정한다.
    location = /api/py/swagger-ui.html {
        return 308 /api/py/docs;
    }

    # FastAPI docs 기본 openapi URL(/openapi.json)을 py 네임스페이스로 재작성한다.
    location = /api/py/docs {
        proxy_pass http://bridgework_fastapi_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        proxy_set_header X-Forwarded-Prefix /api/py;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        sub_filter_once off;
        sub_filter "url: '/openapi.json'" "url: '/api/py/openapi.json'";
        sub_filter 'url: "/openapi.json"' 'url: "/api/py/openapi.json"';
        sub_filter "oauth2RedirectUrl: window.location.origin + '/docs/oauth2-redirect'" "oauth2RedirectUrl: window.location.origin + '/api/py/docs/oauth2-redirect'";
    }

    location = /api/py/docs/oauth2-redirect {
        proxy_pass http://bridgework_fastapi_backend/docs/oauth2-redirect;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api/py;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location = /api/py/openapi.json {
        proxy_pass http://bridgework_fastapi_backend/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api/py;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # Spring API는 /api/java/v1/* 경로를 /api/v1/*로 매핑한다.
    location = /api/java/v1 {
        return 308 /api/java/v1/;
    }

    location /api/java/v1/ {
        proxy_pass http://bridgework_backend/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # FastAPI는 /api/py/v1/* 경로를 /api/v1/*로 매핑한다.
    location = /api/py/v1 {
        return 308 /api/py/v1/;
    }

    location /api/py/v1/ {
        proxy_pass http://bridgework_fastapi_backend/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location / {
        return 404;
    }
}
