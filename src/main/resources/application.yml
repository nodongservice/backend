server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: bridgework-backend
  profiles:
    default: local
  datasource:
    hikari:
      connection-init-sql: SET TIME ZONE 'UTC'
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  lifecycle:
    timeout-per-shutdown-phase: 20s
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  mvc:
    async:
      # 대용량 응답/외부 연동 처리 시 응답 스트림이 조기 종료되지 않도록 요청 타임아웃을 상향한다.
      request-timeout: 300s
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      timeout: 3s

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

bridgework:
  openapi:
    server-url: /
  discord:
    spring-bot-webhook-url: ""
  health-monitor:
    enabled: true
    interval: PT60S
    request-timeout: 5s
    fastapi-health-url: http://localhost:8000/health
    alert-reminder-interval: 10m
  rate-limit:
    enabled: true
    # Redis 장애가 API 전체 장애로 번지지 않도록 기본은 fail-open으로 둔다.
    fail-open: true
    redis-key-prefix: bridgework:rate-limit
    excluded-path-patterns:
      - /actuator/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /v3/api-docs/**
      - /error
    policies:
      - id: auth-sensitive
        methods: [POST]
        path-patterns:
          - /api/v1/auth/admin/login
          - /api/v1/auth/social/login
          - /api/v1/auth/social/signup/complete
          - /api/v1/auth/token/refresh
          - /api/v1/auth/withdraw/cancel
        key-scope: IP
        capacity: 10
        refill-tokens: 10
        refill-period: 1m
      - id: admin-mutating
        methods: [POST, DELETE, PUT, PATCH]
        path-patterns:
          - /api/v1/admin/**
        key-scope: USER_OR_IP
        capacity: 20
        refill-tokens: 20
        refill-period: 1m
      - id: heavy-ai
        methods: [POST]
        path-patterns:
          - /api/v1/recommend/quick
          - /api/v1/recommend/map
          - /api/v1/recommend/explain
          - /api/v1/profiles/ocr/extract
        key-scope: USER_OR_IP
        capacity: 10
        refill-tokens: 10
        refill-period: 1m
      - id: write-api
        methods: [POST, PUT, PATCH, DELETE]
        path-patterns:
          - /api/v1/**
        key-scope: USER_OR_IP
        capacity: 60
        refill-tokens: 60
        refill-period: 1m
      - id: public-read
        methods: [GET]
        path-patterns:
          - /api/v1/options/**
          - /api/v1/map/support-agencies
          - /api/v1/postings/popular
        key-scope: IP
        capacity: 300
        refill-tokens: 300
        refill-period: 1m
      - id: read-api
        methods: [GET]
        path-patterns:
          - /api/v1/**
        key-scope: USER_OR_IP
        capacity: 180
        refill-tokens: 180
        refill-period: 1m
  recommend:
    fastapi-base-url: http://localhost:8000
    quick-path: /api/v1/score/quick
    map-path: /api/v1/score/map
    explain-path: /api/v1/explain/recommendation
    # FastAPI 스코어링/설명 생성 지연을 감안해 클라이언트 타임아웃을 상향한다.
    request-timeout: 120s
  profile-ocr:
    fastapi-base-url: ${bridgework.recommend.fastapi-base-url:http://localhost:8000}
    extract-path: /api/v1/profile-draft/from-portfolio
    # OCR + LLM 처리 시간을 고려해 게이트웨이 타임아웃을 길게 잡는다.
    request-timeout: 180s
    # 연결 조기 종료 같은 일시 오류를 URI별로 재시도한다.
    retry-attempts-per-uri: 2
    max-upload-bytes: 10485760
    allowed-content-types:
      - application/pdf
  sync:
    cron: "0 0 0 * * *"
    cron-zone: Asia/Seoul
    request-timeout: 20s
    kric-station-code-file-path: resources/reference/operating_agency_station_codes_2026-02-28.xlsx
    sources:
      - source-type: KEPAD_RECRUITMENT
        enabled: true
        base-url: http://apis.data.go.kr/B552583/job/job_list_env
        service-key: ${bridgework.sync.data-go-kr-service-key}
        page-size: 1000
        max-pages: 1000
        item-id-field: joReqstNo
      - source-type: KEPAD_JOB_CATEGORY
        enabled: true
        base-url: http://apis.data.go.kr/B552583/jobcode/job_code
        service-key: ${bridgework.sync.data-go-kr-service-key}
        page-size: 1000
        max-pages: 1000
        item-id-field: clCode
      - source-type: KEPAD_STANDARD_WORKPLACE
        enabled: true
        base-url: http://apis.data.go.kr/B552583/comp/comp_auth
        service-key: ${bridgework.sync.data-go-kr-service-key}
        page-size: 1000
        max-pages: 1000
        item-id-field: bsnmNo
      - source-type: KEPAD_SUPPORT_AGENCY
        enabled: true
        base-url: http://apis.data.go.kr/B552583/instn/instn_list
        service-key: ${bridgework.sync.data-go-kr-service-key}
        page-size: 1000
        max-pages: 1000
        item-id-field: insttCode
      - source-type: KORAIL_WEEK_PERSON_FACILITIES
        enabled: true
        base-url: https://apis.data.go.kr/B551457/convenience/weekPersonFacilities
        service-key: ${bridgework.sync.data-go-kr-service-key}
        page-size: 1000
        max-pages: 1000
        item-id-field: stn_cd
        query-params:
          returnType: JSON
      - source-type: SEOUL_TRANSPORT_WEAK_WHEELCHAIR_LIFT
        enabled: true
        base-url: https://apis.data.go.kr/B553766/wksn/getWksnWhcllift
        service-key: ${bridgework.sync.data-go-kr-service-key}
        page-size: 1000
        max-pages: 1000
        item-id-field: elvtrSn
        query-params:
          dataType: JSON
      - source-type: TRANSPORT_SUPPORT_CENTER
        enabled: true
        base-url: https://api.data.go.kr/openapi/tn_pubr_public_tfcwker_mvmn_cnter_api
        service-key: ${bridgework.sync.data-go-kr-service-key}
        page-size: 1000
        max-pages: 1000
        item-id-field: id
        query-params:
          type: json
      - source-type: RAIL_WHEELCHAIR_LIFT
        enabled: true
        base-url: https://openapi.kric.go.kr/openapi/vulnerableUserInfo/stationWheelchairLiftLocation
        service-key: ${bridgework.sync.kric-service-key}
        page-size: 1
        max-pages: 1
        item-id-field: stinCd
        query-params:
          service: vulnerableUserInfo
          operation: stationWheelchairLiftLocation
          format: json
      - source-type: RAIL_WHEELCHAIR_LIFT_MOVEMENT
        enabled: true
        base-url: https://openapi.kric.go.kr/openapi/vulnerableUserInfo/stationWheelchairLiftMovement
        service-key: ${bridgework.sync.kric-service-key}
        page-size: 1
        max-pages: 1
        item-id-field: stinCd
        query-params:
          service: vulnerableUserInfo
          operation: stationWheelchairLiftMovement
          format: json
      - source-type: SEOUL_WHEELCHAIR_LIFT
        enabled: true
        base-url: https://www.data.go.kr/data/15044262/fileData.do
        service-key: ${bridgework.sync.data-go-kr-service-key}
        page-size: 10000
        max-pages: 1000
        item-id-field: 승강기 일련번호
      - source-type: SEOUL_SUBWAY_ENTRANCE_LIFT
        enabled: true
        base-url: http://openapi.seoul.go.kr:8088
        service-key: ${bridgework.sync.seoul-open-api-key}
        page-size: 1000
        max-pages: 1000
        query-params:
          serviceName: tbTraficEntrcLft
      - source-type: SEOUL_WALKING_NETWORK
        enabled: true
        base-url: http://openapi.seoul.go.kr:8088
        service-key: ${bridgework.sync.seoul-open-api-key}
        page-size: 1000
        max-pages: 1000
        query-params:
          serviceName: TbTraficWlkNet
      - source-type: NATIONWIDE_BUS_STOP
        enabled: true
        base-url: https://www.data.go.kr/data/15067528/fileData.do
        service-key: ${bridgework.sync.data-go-kr-service-key}
        page-size: 10000
        max-pages: 1000
      - source-type: SEOUL_WHEELCHAIR_RAMP_STATUS
        enabled: true
        base-url: https://data.seoul.go.kr/dataList/OA-13116/S/1/datasetView.do
        page-size: 1000
        max-pages: 1
      - source-type: SEOUL_LOW_FLOOR_BUS_ROUTE_RETENTION
        enabled: true
        base-url: https://data.seoul.go.kr/dataList/OA-22229/F/1/datasetView.do
        page-size: 1000
        max-pages: 1
      - source-type: NATIONWIDE_TRAFFIC_LIGHT
        enabled: true
        base-url: https://api.data.go.kr/openapi/tn_pubr_public_traffic_light_api
        service-key: ${bridgework.sync.data-go-kr-service-key}
        page-size: 1000
        max-pages: 1000
        item-id-field: tfclghtManageNo
        query-params:
          type: xml
      - source-type: NATIONWIDE_CROSSWALK
        enabled: true
        base-url: https://api.data.go.kr/openapi/tn_pubr_public_crosswalk_api
        service-key: ${bridgework.sync.data-go-kr-service-key}
        request-timeout: 60s
        page-size: 1000
        max-pages: 1000
        item-id-field: crswlkManageNo
        query-params:
          type: xml
      - source-type: VOCATIONAL_TRAINING
        enabled: true
        base-url: https://www.work24.go.kr/cm/openApi/call/hr/callOpenApiSvcInfo310L01.do
        service-key: ${bridgework.sync.work24-vocational-training-auth-key}
        page-size: 100
        max-pages: 1000
        item-id-field: trprId
        items-json-pointer: /HRDNet/srchList/scn_list
        total-count-json-pointer: /HRDNet/scn_cnt
      - source-type: JOBSEEKER_COMPETENCY_PROGRAM
        enabled: true
        base-url: https://www.work24.go.kr/cm/openApi/call/wk/callOpenApiSvcInfo217L01.do
        service-key: ${bridgework.sync.work24-competency-auth-key}
        page-size: 100
        max-pages: 1000
        items-json-pointer: /empPgmSchdInviteList/empPgmSchdInvite
        total-count-json-pointer: /empPgmSchdInviteList/total
  auth:
    signup-session-validity: 20m
    withdrawal-grace-period: 30d
    withdrawal-finalize-interval: 1h
    allowed-origins:
      - http://localhost:3000
    jwt:
      issuer: bridgework
      access-token-validity: 15m
      refresh-token-validity: 14d
    oauth2:
      kakao:
        token-uri: https://kauth.kakao.com/oauth/token
        user-info-uri: https://kapi.kakao.com/v2/user/me
      naver:
        token-uri: https://nid.naver.com/oauth2.0/token
        user-info-uri: https://openapi.naver.com/v1/nid/me
