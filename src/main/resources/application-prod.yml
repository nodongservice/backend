spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:3s}

bridgework:
  sync:
    kric-station-code-file-path: ${KRIC_STATION_CODE_XLSX_PATH}
    data-go-kr-service-key: ${DATA_GO_KR_SERVICE_KEY}
    kric-service-key: ${KRIC_SERVICE_KEY}
    work24-vocational-training-auth-key: ${WORK24_VOCATIONAL_TRAINING_AUTH_KEY}
    work24-competency-auth-key: ${WORK24_COMPETENCY_AUTH_KEY}
    seoul-open-api-key: ${SEOUL_OPEN_API_KEY}
  auth:
    allowed-origins:
      - ${BRIDGEWORK_AUTH_ALLOWED_ORIGIN}
    jwt:
      secret: ${BRIDGEWORK_AUTH_JWT_SECRET}
    oauth2:
      kakao:
        client-id: ${KAKAO_CLIENT_ID}
        client-secret: ${KAKAO_CLIENT_SECRET}
        redirect-uri: ${KAKAO_REDIRECT_URI}
      naver:
        client-id: ${NAVER_CLIENT_ID}
        client-secret: ${NAVER_CLIENT_SECRET}
        redirect-uri: ${NAVER_REDIRECT_URI}
