spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: bridgework-redis
      port: 6379
      password: ${REDIS_PASSWORD}
      timeout: 3s

server:
  forward-headers-strategy: framework

bridgework:
  openapi:
    server-url: /
  discord:
    spring-bot-webhook-url: ${SPRING_BOT_DISCORD_WEBHOOK_URL}
  health-monitor:
    fastapi-health-url: ${BRIDGEWORK_FASTAPI_HEALTH_URL:http://host.docker.internal:19000/health,http://host.docker.internal:19001/health}
  recommend:
    fastapi-base-url: ${BRIDGEWORK_RECOMMEND_FASTAPI_BASE_URL:http://host.docker.internal/api/py}
    quick-path: /api/v1/score/quick
    map-path: /api/v1/score/map
    explain-path: /api/v1/explain/recommendation
  sync:
    kric-station-code-file-path: /app/resources/reference/operating_agency_station_codes_2026-02-28.xlsx
    data-go-kr-service-key: ${DATA_GO_KR_SERVICE_KEY}
    kric-service-key: ${KRIC_SERVICE_KEY}
    naver-geocode-api-key-id: ${NAVER_GEOCODE_API_KEY_ID}
    naver-geocode-api-key: ${NAVER_GEOCODE_API_KEY}
    work24-vocational-training-auth-key: ${WORK24_VOCATIONAL_TRAINING_AUTH_KEY}
    work24-competency-auth-key: ${WORK24_COMPETENCY_AUTH_KEY}
    seoul-open-api-key: ${SEOUL_OPEN_API_KEY}
  auth:
    allowed-origins:
      - https://bridgework.cloud
      - https://www.bridgework.cloud
      - http://localhost:3000
    jwt:
      secret: ${BRIDGEWORK_AUTH_JWT_SECRET}
    oauth2:
      kakao:
        client-id: 0d5fffe82670b3aba1f9c1c2e551dbee
        client-secret: ${KAKAO_CLIENT_SECRET}
        redirect-uri: http://localhost:3000/auth/kakao/callback
      naver:
        client-id: sk1Y_ivVnHWKz59glY0x
        client-secret: ${NAVER_CLIENT_SECRET}
        redirect-uri: http://localhost:3000/auth/naver/callback
